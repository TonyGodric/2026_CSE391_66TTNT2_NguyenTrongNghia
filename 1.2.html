<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!--
        style.css chỉ chứa những gì Bootstrap không hỗ trợ sẵn.
        Mọi spacing, color, layout đều dùng Bootstrap utility classes.
    -->
    <style>
        /* Nền tổng thể tối hơn default Bootstrap dark */
        body { background-color: #0f1117; }

        /* Highlight hàng điểm yếu — Bootstrap không có màu cảnh báo cho table-dark */
        .table-warning-row td { background-color: rgba(255, 193, 7, 0.12) !important; }

        /* Con trỏ và hover cho cột có thể sắp xếp */
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: var(--bs-primary) !important; }
    </style>
</head>
<body>
<div class="container py-5">

    <!-- ── HEADER ── -->
    <div class="d-flex align-items-baseline gap-3 mb-4">
        <h1 class="h3 fw-bold text-primary mb-0">Quản lý sinh viên</h1>
        <span class="text-secondary small">Lab 4</span>
    </div>

    <!-- ── FORM THÊM SINH VIÊN ── -->
    <div class="card bg-dark border-secondary mb-3">
        <div class="card-body">
            <div class="row g-3 align-items-end">

                <!-- Họ tên -->
                <div class="col-12 col-sm">
                    <label for="inputStudentName"
                           class="form-label text-secondary small fw-semibold text-uppercase">
                        Họ tên
                    </label>
                    <input type="text" id="inputStudentName"
                           class="form-control"
                           placeholder="Nguyễn Văn A">
                </div>

                <!-- Điểm -->
                <div class="col-12 col-sm-3">
                    <label for="inputStudentScore"
                           class="form-label text-secondary small fw-semibold text-uppercase">
                        Điểm (0–10)
                    </label>
                    <input type="text" id="inputStudentScore"
                           class="form-control"
                           placeholder="8.5">
                </div>

                <!-- Nút thêm -->
                <div class="col-12 col-sm-auto">
                    <button id="btnAddStudent" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg me-1"></i>Thêm
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- ── BỘ LỌC & TÌM KIẾM ── -->
    <div class="card bg-dark border-secondary mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-center">

                <!-- Ô tìm kiếm -->
                <div class="col-12 col-sm">
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" id="searchInput"
                               class="form-control"
                               placeholder="Tìm kiếm tên sinh viên...">
                    </div>
                </div>

                <!-- Lọc xếp loại -->
                <div class="col-12 col-sm-auto">
                    <select id="selectRankFilter" class="form-select">
                        <option value="">Tất cả xếp loại</option>
                        <option value="Giỏi">Giỏi</option>
                        <option value="Khá">Khá</option>
                        <option value="Trung bình">Trung bình</option>
                        <option value="Yếu">Yếu</option>
                    </select>
                </div>

            </div>
        </div>
    </div>

    <!-- ── BẢNG DỮ LIỆU ── -->
    <div class="table-responsive rounded border border-secondary">
        <table class="table table-dark table-hover table-bordered mb-0" id="studentTable">
            <thead class="text-uppercase small text-secondary">
                <tr>
                    <th scope="col" style="width:60px">STT</th>
                    <th scope="col">Họ tên</th>
                    <!--
                        id="scoreHeader" để JS tìm cột sắp xếp.
                        class="sortable" để CSS thay cursor.
                    -->
                    <th scope="col" id="scoreHeader" class="sortable" style="width:120px">
                        Điểm
                    </th>
                    <th scope="col" style="width:140px">Xếp loại</th>
                    <th scope="col" style="width:100px">Thao tác</th>
                </tr>
            </thead>

            <!-- JS sẽ render vào đây -->
            <tbody id="studentTableBody"></tbody>

            <!-- Hàng thống kê -->
            <tfoot>
                <tr class="small fw-semibold text-secondary">
                    <td colspan="2" class="text-end">Tổng sinh viên:</td>
                    <td id="totalStudents" class="text-primary fw-bold">0</td>
                    <td class="text-end">Điểm TB:</td>
                    <td id="averageScore" class="text-primary fw-bold">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/1.2.js"></script>
</body>
</html>
