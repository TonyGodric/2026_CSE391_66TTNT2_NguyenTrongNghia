<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hành 4 – Quản lý sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1117; }
        /* Hàng điểm yếu — JS gốc dùng style.backgroundColor = "yellow",
           nếu muốn dùng class thay thế thì thêm class "low-score" vào tr
           và dùng rule này */
        .low-score td { background-color: rgba(255, 193, 7, 0.12) !important; }
    </style>
</head>
<body>
<div class="container py-5">

    <!-- Header -->
    <div class="d-flex align-items-baseline gap-3 mb-4">
        <h2 class="h3 fw-bold text-primary mb-0">Quản lý sinh viên</h2>
        <span class="text-secondary small">Bài 6</span>
    </div>

    <!-- Form nhập liệu -->
    <div class="card bg-dark border-secondary mb-3">
        <div class="card-body">
            <div class="row g-3 align-items-end">

                <div class="col-12 col-sm">
                    <label for="inputStudentName"
                           class="form-label text-secondary small fw-semibold text-uppercase">
                        Họ tên
                    </label>
                    <input type="text" id="inputStudentName"
                           class="form-control"
                           placeholder="Nguyễn Văn A">
                </div>

                <div class="col-12 col-sm-3">
                    <label for="inputStudentScore"
                           class="form-label text-secondary small fw-semibold text-uppercase">
                        Điểm (0–10)
                    </label>
                    <input type="text" id="inputStudentScore"
                           class="form-control"
                           placeholder="8.5">
                </div>

                <div class="col-12 col-sm-auto">
                    <button id="btnAddStudent" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg me-1"></i>Thêm sinh viên
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bảng -->
    <div class="table-responsive rounded border border-secondary">
        <table class="table table-dark table-hover table-bordered mb-0" id="studentTable">
            <thead class="text-uppercase small text-secondary">
                <tr>
                    <th scope="col" style="width:60px">STT</th>
                    <th scope="col">Họ tên</th>
                    <th scope="col" style="width:100px">Điểm</th>
                    <th scope="col" style="width:140px">Xếp loại</th>
                    <th scope="col" style="width:110px">Thao tác</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <!-- JS sẽ thêm dòng vào đây -->
            </tbody>
            <tfoot>
                <tr class="small fw-semibold text-secondary">
                    <td colspan="2" class="text-end">Tổng số sinh viên:</td>
                    <td id="totalStudents" class="text-primary fw-bold">0</td>
                    <td class="text-end">Điểm trung bình:</td>
                    <td id="averageScore" class="text-primary fw-bold">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/1.1.js"></script>
</body>
</html>
